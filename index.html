<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | Ibrahim Zuhdi Shahab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f5f5f4; /* Stone 100 / Cream */
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-page {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .bg-cream { background-color: #fafaf9; }
        .text-chocolate { color: #44403c; }
        .border-chocolate { border-color: #78716c; }
        .bg-chocolate { background-color: #57534e; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">
    <div class="animate-page max-w-4xl w-full bg-[#fdfcfb] rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-[#e7e5e4]">
        <div class="md:w-1/2 h-96 md:h-auto overflow-hidden">
            <!-- Foto Profil diperbarui dengan URL baru -->
            <img src="https://lh3.googleusercontent.com/d/1I1npBtpo9QGl-gXa4kiLPeE92AUdTJAQ" alt="Profil Ibrahim Zuhdi Shahab" class="w-full h-full object-cover">
        </div>
        <div class="md:w-1/2 p-12 flex flex-col justify-center bg-[#fcfaf8]">
            <h2 class="text-[#8c7851] font-bold uppercase tracking-widest text-xs mb-3">Arsitek & Desainer</h2>
            <h1 class="text-4xl font-black text-[#44403c] mb-6 leading-tight">Ibrahim Zuhdi Shahab</h1>
            <div class="w-12 h-1 bg-[#8c7851] mb-8"></div>
            <p class="text-[#78716c] leading-relaxed mb-10 text-lg">
                Lulusan Arsitektur Institut Teknologi Bandung. Saya berfokus pada harmoni antara material bumi dan fungsi ruang, menciptakan hunian yang hangat dengan sentuhan cokelat kayu dan estetika minimalis.
            </p>
            <div class="space-y-5">
                <div class="flex items-center gap-4 text-[#57534e]">
                    <div class="p-2 bg-[#f5f5f4] rounded-lg"><i data-lucide="map-pin" class="w-5 h-5"></i></div>
                    <span class="font-medium">Bandung / Jakarta, Indonesia</span>
                </div>
                <div class="flex items-center gap-4 text-[#57534e]">
                    <div class="p-2 bg-[#f5f5f4] rounded-lg"><i data-lucide="mail" class="w-5 h-5"></i></div>
                    <span class="font-medium text-sm">ibrahimzuhdi@email.com</span>
                </div>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
